<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Thunder - Dancing on the Edge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .audio-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.6s ease;
        }

        .play-btn {
            background-color: #e50914;
            color: #fff;
            border: none;
            padding: 18px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.05);
            background-color: #ff1523;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe 
            id="yt-video"
            src="https://www.youtube.com/embed/miVz9nsMYEw" 
            frameborder="0" 
            allow="autoplay; encrypted-media">
        </iframe>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mp3">
    </audio>

    <div id="overlay" class="audio-overlay">
        <button class="play-btn" onclick="startEverything()">🚀 ATTACK THE D POINT!</button>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-video', {
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.mute();
        }

        function startEverything() {
            var audio = document.getElementById("bg-music");
            var overlay = document.getElementById("overlay");
            
            if (audio) {
                audio.play();
            }
            
            if (player && typeof player.playVideo === 'function') {
                player.playVideo();
            }
            
            overlay.style.opacity = "0";
            setTimeout(function() {
                overlay.style.display = "none";
            }, 600);
        }
    </script>

</body>
</html>
